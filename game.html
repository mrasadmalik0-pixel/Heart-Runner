<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Heart Runner</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        #selectionOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .char-grid { display: flex; gap: 20px; margin-top: 30px; }
        .char-card {
            font-size: 55px; cursor: pointer; background: rgba(255,255,255,0.1);
            width: 90px; height: 90px; display: flex; align-items: center; justify-content: center;
            border-radius: 20px; border: 2px solid #444; transition: 0.3s;
        }
        .char-card:hover { border-color: #ff416c; transform: scale(1.1); }

        .hud {
            position: fixed; top: 15px; width: 100%; display: flex;
            justify-content: space-around; pointer-events: none; z-index: 10;
        }
        .glass-box {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 8px 20px; border-radius: 15px; color: #fff; font-size: 20px; font-weight: bold;
        }

        #gameOver {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            flex-direction: column; align-items: center; justify-content: center;
            color: #fff; z-index: 1500; text-align: center;
        }
        .wounded-heart { font-size: 100px; animation: heartbeat 1.2s infinite; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        
        .btn {
            background: #ff416c; border: none; padding: 12px 40px;
            color: #fff; border-radius: 30px; font-size: 18px; margin-top: 25px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="selectionOverlay">
        <h2 style="color: white; letter-spacing: 2px;">CHOOSE CHARACTER</h2>
        <div class="char-grid">
            <div class="char-card" onclick="startGame('👦')">👦</div>
            <div class="char-card" onclick="startGame('👧')">👧</div>
            <div class="char-card" onclick="startGame('🥷')">🥷</div>
        </div>
    </div>

    <div class="hud">
        <div class="glass-box" style="color: #ff416c;">❤️ <span id="hCount">0</span></div>
        <div class="glass-box">📏 <span id="dist">0m</span></div>
    </div>

    <div id="gameOver">
        <div class="wounded-heart">❤️‍🩹</div>
        <h1 style="color: #ff416c; margin-top: 10px;">HEART IS WOUNDED</h1>
        <p style="font-size: 20px;">Total Hearts: <span id="fScore">0</span></p>
        <button class="btn" onclick="location.reload()">HEAL & TRY AGAIN</button>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let playerEmoji = '👦', isStarted = false, isAlive = true;
        let score = 0, distance = 0, speed = 6, frame = 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(f, t, d) {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.value = f; g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
        }

        // Zameen ka level fix kiya
        const groundY = canvas.height - 100;
        let player = { x: 60, y: groundY - 50, w: 50, h: 50, dy: 0, jump: 16, gravity: 0.7 };

        let obstacles = [], hearts = [], stars = [];
        for(let i=0; i<60; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});

        function startGame(emoji) {
            playerEmoji = emoji;
            document.getElementById("selectionOverlay").style.display = "none";
            isStarted = true; animate();
        }

        function triggerJump() { if(player.y >= groundY - 50 && isAlive && isStarted) { player.dy = -player.jump; beep(450, 'triangle', 0.2); } }
        window.addEventListener("mousedown", triggerJump);
        window.addEventListener("touchstart", (e) => { e.preventDefault(); triggerJump(); });

        function animate() {
            if(!isAlive) return;
            frame++; distance += 0.1;
            document.getElementById("dist").innerText = Math.floor(distance) + "m";

            // Draw Background
            ctx.fillStyle = "#0a0a1a"; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.x -= 0.5; if(s.x < 0) s.x = canvas.width; });

            // Player Physics
            player.dy += player.gravity; player.y += player.dy;
            if(player.y > groundY - 50) { player.y = groundY - 50; player.dy = 0; }

            // Draw Player
            ctx.font = "50px Arial";
            ctx.fillText(playerEmoji, player.x, player.y + 40);

            // Knives 🔪 (Obstacles)
            if(frame % 100 == 0) obstacles.push({x: canvas.width, y: groundY - 10});
            obstacles.forEach((k, i) => {
                k.x -= speed;
                ctx.fillText("🔪", k.x, k.y);
                // Knife Collision logic
                if(player.x < k.x + 30 && player.x + 30 > k.x && player.y + 40 > k.y - 30) {
                    isAlive = false; beep(150, 'sawtooth', 0.6);
                    document.getElementById("fScore").innerText = score;
                    document.getElementById("gameOver").style.display = "flex";
                }
                if(k.x < -50) { obstacles.splice(i, 1); speed += 0.05; }
            });

            // Hearts ❤️ (Collectibles - Fixed Logic)
            if(frame % 120 == 0) {
                // Hearts ko random unchai par rakha hai takay jump karke lene paren
                hearts.push({x: canvas.width, y: groundY - (Math.random() * 100 + 50)});
            }
            hearts.forEach((h, i) => {
                h.x -= speed * 0.9;
                ctx.shadowBlur = 15; ctx.shadowColor = "#ff416c";
                ctx.fillText("❤️", h.x, h.y);
                ctx.shadowBlur = 0;

                // Heart Collision logic
                if(player.x < h.x + 40 && player.x + 40 > h.x && 
                   player.y < h.y && player.y + 50 > h.y - 30) {
                    hearts.splice(i, 1);
                    score++;
                    document.getElementById("hCount").innerText = score;
                    beep(800, 'sine', 0.1);
                }
                if(h.x < -50) hearts.splice(i, 1);
            });

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
